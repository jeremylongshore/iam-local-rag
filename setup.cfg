# mutmut only reads its config from setup.cfg (not pyproject.toml). This file
# exists solely for the L3 mutation-testing gate; all other tool config lives in
# pyproject.toml.
#
# Scope note (2026-07-05): the baseline gate targets the two smaller
# invariant-critical modules — the citation/refusal verifier (acceptance
# invariant #3) and the tamper-evident ledger hash-chain. policy.py is added to
# paths_to_mutate in PR2 once the parametrized secret/PII regex tests land, so
# its kill-rate is meaningful rather than dominated by un-killed regex-internal
# mutants. Advisory until the moat modules clear the floor — see
# tests/TESTING.md and 000-docs/009-TQ-AUDT.
[mutmut]
paths_to_mutate=nexus/retrieval/citation_verifier.py,nexus/core/ledger.py
runner=python -m pytest -m 'not integration' -x -q
tests_dir=03-Tests/
