# mutmut only reads its config from setup.cfg (not pyproject.toml). This file
# exists solely for the L3 mutation-testing gate; all other tool config lives in
# pyproject.toml.
#
# Scope note (settled 2026-07-05): the mutation gate targets PURE-LOGIC modules,
# where a surviving mutant is a real assertion gap. Currently:
#   citation_verifier.py  — the cited-or-refuse decision (invariant #3); baseline 10/20 killed.
#
# policy.py and ledger.py are deliberately OUT of scope. Whole-file mutmut on them
# is dominated by low-value STRING mutants — mutating a char inside a secret/PII
# regex (policy.py) or a SQL literal (ledger.py) usually yields an equivalent-ish,
# un-killable mutant that swamps the meaningful logic mutants, and ledger.py's
# whole-file run overran a 4-min bound in the smoke (the "slow as the suite grows"
# failure mode). Their assurance comes from targeted tests that are STRONGER than
# mutation for that shape of code:
#   - policy.py regexes -> PR2 parametrized positive + near-miss boundary tests
#     (test_policy.py TestEverySecretPattern / TestEveryPiiPattern): a loosened or
#     tightened regex fails the near-miss or the positive, exactly as a mutant would.
#   - ledger.py hash-chain -> test_ledger_chain.py physically mutates the SQLite DB
#     and asserts verify_chain() detects the tamper — a real fault-injection test.
# Advisory until citation_verifier clears a kill-rate floor — see tests/TESTING.md
# and 000-docs/009-TQ-AUDT.
#
# runner override is REQUIRED, not incidental: mutmut's default runner runs the
# whole tests_dir, which includes the @pytest.mark.integration tests that need a
# live Ollama the mutation CI job does not have — they'd error on every mutant.
# `-m 'not integration'` is the exclusion. NOTE: mutmut 2.x (pinned <3) has no
# `pytest_add_cli_args_test_selection` hook (that is a 3.x feature), so `runner`
# is the only way to pass the marker filter here. Smart mutant selection is done
# in CI via `mutmut run --use-coverage`, which skips mutants on lines the unit
# suite never covers.
[mutmut]
paths_to_mutate=nexus/retrieval/citation_verifier.py
runner=python -m pytest -m 'not integration' -x -q
tests_dir=03-Tests/
