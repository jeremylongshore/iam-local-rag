# Pre-commit hooks for Intent NEXUS. Install with: pre-commit install
# Mirrors the CI `lint` job so issues surface before push, not on the PR.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(99-Archive/|\.beads/)'
      - id: end-of-file-fixer
        exclude: '^(99-Archive/|\.beads/)'
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key

  # Intent Solutions audit harness — escape-scan on staged diff (in-repo).
  - repo: local
    hooks:
      - id: audit-harness-escape-scan
        name: audit-harness escape-scan (staged)
        entry: audit-harness escape-scan --staged
        language: system
        pass_filenames: false
        always_run: true
