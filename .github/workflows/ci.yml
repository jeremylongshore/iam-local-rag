name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff (lint + import order)
        run: ruff check .
      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12' ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev + ui
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui]'
      - name: Unit tests (no external services)
        run: pytest -m "not integration" -v --cov=nexus --cov-report=term-missing --cov-fail-under=55

  harness:
    # Intent Solutions audit harness (in-repo enforcement). Advisory for now;
    # promote gates to blocking in tests/TESTING.md once the baseline is clean.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Harness — hash verify
        run: audit-harness verify
      - name: Harness — test-bias scan (advisory)
        continue-on-error: true
        run: audit-harness bias 03-Tests
      - name: Harness — escape scan on PR diff (advisory)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: audit-harness escape-scan --range "origin/${{ github.base_ref }}..HEAD"

  integration:
    # Heavier suite — needs a live Ollama; won't block merges.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev + ui
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui]'
      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh
      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 30); do
            sleep 1
            ollama list && break
          done
      - name: Pull model
        run: ollama pull llama3
      - name: Integration + API tests (LOCAL mode)
        env:
          NEXUS_MODE: local
          OLLAMA_MODEL: llama3
          DOCUMENTS_DIR: ./documents
          CHROMA_DB_PATH: ./chroma_db_ci
          LEDGER_DB_PATH: ./nexus_ledger_ci.db
        run: pytest -m integration -v
      - name: Smoke the core package (no UI, no network)
        run: python -c "import nexus; from nexus.core.rag_pipeline import RAGPipeline; print('nexus core imports OK')"

  release:
    needs: [ test ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            # Intent NEXUS Release

            Local-first BYOK document intelligence — verifiable citations, privacy
            receipts, provider portability, and policy-bounded cloud acceleration.

            ## Install
            ```bash
            git clone https://github.com/jeremylongshore/iam-local-rag.git
            cd iam-local-rag
            pip install -e '.[dev]'
            ```

            ## What's Changed
            See automated changelog below.
          files: |
            README.md
            pyproject.toml
