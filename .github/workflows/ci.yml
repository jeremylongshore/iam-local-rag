name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff (lint + import order)
        run: ruff check .
      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12' ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev + ui
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui]'
      - name: Unit tests (no external services)
        run: pytest -m "not integration" -v --cov=nexus --cov-report=term-missing --cov-fail-under=78

  mutation:
    # L3 mutation testing (assertion-strength gate). ADVISORY baseline — the
    # kill-rate floor lives in tests/TESTING.md; promote to blocking once the
    # moat modules clear it (epic local-s9e / 000-docs/009-TQ-AUDT). Scope is
    # pinned in setup.cfg [mutmut]; CI is non-TTY so mutmut skips the spinner.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Coverage data (for mutant selection)
        # mutmut --use-coverage reads .coverage to skip mutants on lines the unit
        # suite never exercises — the mutmut-2.x way to keep runs bounded (its
        # runner still excludes the Ollama-dependent integration tests).
        run: pytest -m "not integration" --cov=nexus -q || true
      - name: Mutation run (moat modules; --use-coverage; survivors do not block)
        run: mutmut run --use-coverage || true
      - name: Mutation results
        run: mutmut results

  harness:
    # Intent Solutions audit harness (in-repo enforcement). Advisory for now;
    # promote gates to blocking in tests/TESTING.md once the baseline is clean.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev + ui
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui]'
      - name: Harness — hash verify
        run: audit-harness verify
      - name: Harness — test-bias scan (advisory)
        continue-on-error: true
        run: audit-harness bias 03-Tests
      - name: Harness — Gherkin lint (advisory; features/ now exists)
        continue-on-error: true
        run: audit-harness gherkin-lint
      - name: Coverage data for CRAP (coverage.json)
        # audit-harness crap factors real per-method coverage into the CRAP score
        # ONLY when coverage.json is present (its auto `coverage json` from a bare
        # .coverage is unreliable). Without it every method is scored at coverage=0
        # — which is what made the raw audit read avg 10.38 / max 272 (000-docs/009
        # #2). Generate it explicitly so the score is truthful.
        continue-on-error: true
        run: pytest -m "not integration" --cov=nexus --cov-report=json -q
      - name: Harness — CRAP score (advisory; truthful — radon + coverage.json present)
        # radon>=6.0 ships in [dev]; coverage.json from the step above. NOTE:
        # audit-harness crap FAILS-OPEN (pass:true) if radon is absent — an upstream
        # harness bug (000-docs/009 #3); this job pins radon so the score is real.
        # CAVEAT: the harness has no exclude config, so CRAP also scans 99-Archive/
        # (quarantined legacy) — those blockers are not shipped code. Upstream ask:
        # a CRAP exclude/ignore for archived trees.
        continue-on-error: true
        run: audit-harness crap
      - name: Harness — escape scan on PR diff (advisory)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: audit-harness escape-scan --range "origin/${{ github.base_ref }}..HEAD"

  integration:
    # Heavier suite — needs a live Ollama; won't block merges.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package + dev + ui
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui]'
      - name: Install Ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh
      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          for _ in $(seq 30); do
            sleep 1
            ollama list && break
          done
      - name: Pull small models (fast, CI-friendly)
        run: |
          ollama pull qwen2.5:0.5b        # ~400MB generation model
          ollama pull nomic-embed-text    # ~274MB embedding model
      - name: Integration + API tests (LOCAL mode)
        env:
          NEXUS_MODE: local
          OLLAMA_MODEL: qwen2.5:0.5b
          OLLAMA_EMBED_MODEL: nomic-embed-text
          DOCUMENTS_DIR: ./documents
          CHROMA_DB_PATH: ./chroma_db_ci
          LEDGER_DB_PATH: ./nexus_ledger_ci.db
        run: pytest -m integration -v
      - name: Smoke the core package (no UI, no network)
        run: python -c "import nexus; from nexus.core.rag_pipeline import RAGPipeline; print('nexus core imports OK')"

  release:
    needs: [ test ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            # Intent NEXUS Release

            Local-first BYOK document intelligence — verifiable citations, privacy
            receipts, provider portability, and policy-bounded cloud acceleration.

            ## Install
            ```bash
            git clone https://github.com/jeremylongshore/iam-local-rag.git
            cd iam-local-rag
            pip install -e '.[dev]'
            ```

            ## What's Changed
            See automated changelog below.
          files: |
            README.md
            pyproject.toml
